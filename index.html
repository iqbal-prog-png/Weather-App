<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>☁️ Weather App</h1>

      <div class="search-box">
        <input type="text" id="cityInput" placeholder="Enter city name..." />
        <button onclick="searchWeather()">Search</button>
      </div>

      <div class="loading" id="loading">
        <div class="spinner"></div>
      </div>

      <div class="error" id="error"></div>

      <div class="weather-info" id="weatherInfo">
        <div class="location">
          <h2 id="cityName"></h2>
          <p id="country"></p>
        </div>

        <div class="weather-icon" id="weatherIcon"></div>

        <div class="temperature">
          <div class="temp-value" id="temperature"></div>
          <div class="description" id="description"></div>
        </div>

        <div class="details">
          <div class="detail-item">
            <div class="label">💧 Humidity</div>
            <div class="value" id="humidity"></div>
          </div>
          <div class="detail-item">
            <div class="label">💨 Wind Speed</div>
            <div class="value" id="windSpeed"></div>
          </div>
          <div class="detail-item">
            <div class="label">🌡️ Pressure</div>
            <div class="value" id="pressure"></div>
          </div>
          <div class="detail-item">
            <div class="label">👁️ Visibility</div>
            <div class="value" id="visibility"></div>
          </div>
        </div>

        <div class="extra-info">
          <div>
            <div class="label">Feels Like</div>
            <div class="value" id="feelsLike"></div>
          </div>
          <div>
            <div class="label">Min / Max</div>
            <div class="value" id="minMax"></div>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
